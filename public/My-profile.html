<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile | CoffeeCape</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <style>
    /* =========================================
      DESIGN TOKENS — matched to the CoffeeCape site
    ========================================= */
    :root{
      --primary-color: #3b141c;
      --secondary-color: #f3961c;
      --secondary-dark-color: #e0501f;
      --light-pink-color: #faf4f5;
      --white-color: #fff;
      --dark-color: #252525;
      --medium-gray-color: #94a3b8;
      --border-color: rgba(59, 20, 28, 0.12);
      --success-color: #1f9d55;
      --danger-color: #dc3545;
      --warning-color: #f3961c;
      --info-color: #3b141c;

      --shadow-sm: 0 2px 12px rgba(59, 20, 28, 0.08);
      --shadow-md: 0 10px 28px rgba(59, 20, 28, 0.12);

      --radius-s: 8px;
      --radius-m: 14px;
      --radius-l: 22px;
      --radius-pill: 50px;

      --transition: 0.25s ease;
    }

    /* =========================================
      GLOBAL
    ========================================= */
    *{ box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, var(--light-pink-color) 0%, #fdf1e7 100%);
      color: var(--dark-color);
      margin: 0;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* =========================================
      CONTAINER & CARD
    ========================================= */
    .container {
      max-width: 900px;
      margin: 36px auto 60px;
      padding: 0 20px;
    }

    .profile-card {
      background: var(--white-color);
      border-radius: var(--radius-l);
      padding: 32px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }

    /* =========================================
      PROFILE HEADER
    ========================================= */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border-color);
    }

    .avatar {
      position: relative;
      width: 96px;
      height: 96px;
      flex-shrink: 0;
      border-radius: 50%;
      overflow: hidden;
      background: var(--light-pink-color);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--secondary-color);
      box-shadow: var(--shadow-sm);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .avatar-text {
      font-size: 34px;
      font-weight: 700;
      color: var(--primary-color);
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      background: rgba(59, 20, 28, 0.78);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      opacity: 0;
      transition: opacity var(--transition);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .avatar-overlay i {
      font-size: 16px;
    }

    .avatar.clickable:hover .avatar-overlay {
      opacity: 1;
    }

    /* Persistent camera badge so touch users see it without hovering */
    .avatar-edit-badge {
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--secondary-color);
      color: var(--white-color);
      border: 2px solid var(--white-color);
      border-radius: 50%;
      font-size: 12px;
      box-shadow: var(--shadow-sm);
      pointer-events: none;
    }

    /* Spinner state while an image is uploading */
    .avatar.uploading .avatar-overlay {
      opacity: 1;
    }

    .avatar.uploading .avatar-overlay i {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .profile-heading {
      min-width: 0;
    }

    .profile-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      margin-bottom: 8px;
      border-radius: var(--radius-pill);
      background: rgba(243, 150, 28, 0.14);
      color: var(--secondary-dark-color);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .profile-heading h2 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 700;
      color: var(--primary-color);
    }

    .profile-heading p {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13.5px;
      color: var(--medium-gray-color);
    }

    /* =========================================
      SKELETON LOADING STATE
    ========================================= */
    @keyframes shimmer {
      0% { background-position: -200px 0; }
      100% { background-position: 200px 0; }
    }

    .profile-card.loading .profile-heading h2,
    .profile-card.loading .profile-heading p,
    .profile-card.loading .view-value {
      color: transparent;
      border-radius: 6px;
      background: linear-gradient(90deg, #eee 0px, #f7f7f7 40px, #eee 80px);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite linear;
    }

    .profile-card.loading .avatar-text {
      visibility: hidden;
    }

    .profile-card.loading .avatar {
      background: linear-gradient(90deg, #eee 0px, #f7f7f7 40px, #eee 80px);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite linear;
    }

    /* =========================================
      SECTIONS & FIELDS
    ========================================= */
    .section {
      margin-bottom: 24px;
      padding: 20px 22px;
      background: var(--light-pink-color);
      border-radius: var(--radius-m);
      border: 1px solid var(--border-color);
    }

    .section h3 {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15.5px;
      font-weight: 700;
      margin: 0 0 16px;
      color: var(--primary-color);
    }

    .section h3 i {
      color: var(--secondary-color);
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .row + .row {
      margin-top: 16px;
    }

    .field {
      flex: 1;
      min-width: 200px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--medium-gray-color);
      margin-bottom: 6px;
    }

    .view-value {
      padding: 10px 14px;
      background: var(--white-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-s);
      font-size: 14px;
      font-weight: 500;
      color: var(--dark-color);
      min-height: 20px;
    }

    /* ---- Editable inputs with icon prefix ---- */
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--white-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-s);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input-wrap i {
      padding-left: 14px;
      color: var(--medium-gray-color);
      font-size: 13px;
    }

    .input-wrap input {
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: none;
      font-size: 14px;
      font-family: inherit;
      color: var(--dark-color);
      outline: none;
    }

    .input-wrap input:disabled {
      color: var(--medium-gray-color);
      cursor: not-allowed;
    }

    .input-wrap:focus-within {
      border-color: var(--secondary-color);
      box-shadow: 0 0 0 3px rgba(243, 150, 28, 0.16);
    }

    .input-wrap.invalid {
      border-color: var(--danger-color);
      box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.12);
    }

    .field-hint {
      display: block;
      margin-top: 5px;
      font-size: 11.5px;
      color: var(--danger-color);
      min-height: 14px;
    }

    /* =========================================
      ACTIONS & BUTTONS
    ========================================= */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary-color);
      color: var(--white-color);
      border: none;
      padding: 11px 22px;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
    }

    .btn-primary:hover {
      background: var(--secondary-color);
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white-color);
      border: 1px solid var(--border-color);
      color: var(--primary-color);
      padding: 11px 22px;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background var(--transition);
    }

    .btn-secondary:hover {
      background: var(--light-pink-color);
    }

    .back {
      font-size: 14px;
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
      align-self: center;
      padding: 11px 22px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-color);
      transition: background var(--transition), color var(--transition);
    }

    .back:hover {
      color: var(--white-color);
      background: var(--primary-color);
      border-color: var(--primary-color);
    }

    /* =========================================
      UTILITIES
    ========================================= */
    .hidden {
      display: none !important;
    }

    /* =========================================
      TOAST
    ========================================= */
    .toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      left: auto;
      max-width: calc(100% - 50px);
      background: var(--primary-color);
      color: #fff;
      padding: 13px 20px;
      border-radius: var(--radius-s);
      font-size: 14px;
      font-weight: 500;
      display: none;
      align-items: center;
      box-shadow: var(--shadow-md);
      z-index: 10000;
    }

    .toast.show {
      display: flex;
    }

    .toast.success { background: var(--success-color); }
    .toast.error   { background: var(--danger-color); }
    .toast.warning { background: var(--secondary-dark-color); }
    .toast.info    { background: var(--primary-color); }

    /* =========================================
      VIEW & EDIT MODES
    ========================================= */
    #viewMode,
    #editMode {
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* =========================================
      RESPONSIVE
    ========================================= */
    @media (max-width: 576px) {
      .topbar-inner {
        padding: 12px 16px;
      }

      .topbar-backlink span {
        display: none;
      }

      .container {
        margin: 22px auto 40px;
      }

      .profile-card {
        padding: 22px 18px;
      }

      .profile-header {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .row {
        flex-direction: column;
      }

      .row + .row {
        margin-top: 0;
      }

      .actions {
        flex-direction: column;
        width: 100%;
      }

      .btn-primary,
      .btn-secondary,
      .back {
        width: 100%;
        justify-content: center;
        text-align: center;
      }
    }
  </style>
</head>
<body>
<header>
  <div id="header-container"></div>
</header>

<div class="container">
  <div class="profile-card" id="profileCard">

    <!-- HEADER -->
    <div class="profile-header">
      <div class="avatar clickable" id="avatarBox">
        <img id="avatarImg" src="" alt="Profile Image">
        <span class="avatar-text" id="avatarText">U</span>
        <div class="avatar-overlay"><i class="fa-solid fa-camera"></i><span>Change</span></div>
        <span class="avatar-edit-badge"><i class="fa-solid fa-camera"></i></span>
      </div>

      <input type="file" id="avatarInput" accept="image/*" hidden>

      <div class="profile-heading">
        <span class="profile-tag"><i class="fa-solid fa-mug-hot"></i> CoffeeCape Member</span>
        <h2 id="fullName">User</h2>
        <p><i class="fa-regular fa-envelope"></i> <span id="emailText">user@email.com</span></p>
      </div>
    </div>

    <!-- VIEW MODE -->
    <div id="viewMode">

      <div class="section">
        <h3><i class="fa-solid fa-id-card"></i> Personal Information</h3>

        <div class="row">
          <div class="field"><label>First Name</label><div class="view-value" id="vFirst">-</div></div>
          <div class="field"><label>Last Name</label><div class="view-value" id="vLast">-</div></div>
        </div>

        <div class="row">
          <div class="field"><label>Phone</label><div class="view-value" id="vPhone">-</div></div>
          <div class="field"><label>Email</label><div class="view-value" id="vEmail">-</div></div>
        </div>
      </div>

      <div class="section">
        <h3><i class="fa-solid fa-location-dot"></i> Address</h3>

        <div class="row">
          <div class="field"><label>Street</label><div class="view-value" id="vStreet">-</div></div>
          <div class="field"><label>City/State</label><div class="view-value" id="vCity">-</div></div>
        </div>

        <div class="row">
          <div class="field"><label>ZIP</label><div class="view-value" id="vZip">-</div></div>
          <div class="field"><label>Country</label><div class="view-value" id="vCountry">-</div></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="editBtn"><i class="fa-solid fa-pen"></i> Edit Profile</button>
        <a href="Index.html" class="back">Back to Home</a>
      </div>
    </div>

    <!-- EDIT MODE -->
    <div id="editMode" class="hidden">

      <div class="section">
        <h3><i class="fa-solid fa-id-card"></i> Edit Personal Info</h3>

        <div class="row">
          <div class="field">
            <label>First Name</label>
            <div class="input-wrap"><i class="fa-regular fa-user"></i><input id="eFirst" placeholder="First name"></div>
            <span class="field-hint" id="hintFirst"></span>
          </div>
          <div class="field">
            <label>Last Name</label>
            <div class="input-wrap"><i class="fa-regular fa-user"></i><input id="eLast" placeholder="Last name"></div>
            <span class="field-hint" id="hintLast"></span>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Phone</label>
            <div class="input-wrap"><i class="fa-solid fa-phone"></i><input id="ePhone" placeholder="10-digit number"></div>
            <span class="field-hint" id="hintPhone"></span>
          </div>
          <div class="field">
            <label>Email</label>
            <div class="input-wrap"><i class="fa-regular fa-envelope"></i><input id="eEmail" disabled></div>
          </div>
        </div>
      </div>

      <div class="section">
        <h3><i class="fa-solid fa-location-dot"></i> Edit Address</h3>

        <div class="row">
          <div class="field">
            <label>Street</label>
            <div class="input-wrap"><i class="fa-solid fa-road"></i><input id="eStreet" placeholder="Street address"></div>
          </div>
          <div class="field">
            <label>City/State</label>
            <div class="input-wrap"><i class="fa-solid fa-city"></i><input id="eCity" placeholder="City, State"></div>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>ZIP</label>
            <div class="input-wrap"><i class="fa-solid fa-map-pin"></i><input id="eZip" placeholder="ZIP / Postal code"></div>
            <span class="field-hint" id="hintZip"></span>
          </div>
          <div class="field">
            <label>Country</label>
            <div class="input-wrap"><i class="fa-solid fa-flag"></i><input id="eCountry" placeholder="Country"></div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="saveBtn"><i class="fa-solid fa-check"></i> Save Changes</button>
        <button class="btn-secondary" id="cancelBtn"><i class="fa-solid fa-xmark"></i> Cancel</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <div id="footer-container"></div>
</footer>

<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script src="js/header.js"></script>
<script src="js/footer.js"></script>
<script src="js/common.js"></script>
<script src="js/Profile.js"></script>
</body>
</html>
