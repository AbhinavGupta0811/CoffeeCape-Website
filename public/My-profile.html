<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile | CoffeeCape</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2c7a7b;
      --secondary: #4ca1af;
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
    }

    * {
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
      user-select: none;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--primary);
      color: #fff;
      padding: 18px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 16px;
    }

    .profile-card {
      background: var(--card);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 36px;
      font-weight: 700;
    }

    .avatar.clickable {
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .avatar-text {
      position: absolute;
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      background: rgba(44, 122, 123, 0.75);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .avatar.clickable:hover .avatar-overlay {
      opacity: 1;
    }

    .profile-header h2 {
      margin: 0;
    }

    .profile-header p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .section {
      margin-top: 30px;
    }

    .section h3 {
      margin-bottom: 12px;
      color: var(--primary);
      border-bottom: 2px solid #eee;
      padding-bottom: 6px;
    }

    .row {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .field {
      flex: 1;
      min-width: 220px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:disabled {
      background: #f1f5f9;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 22px;
      padding: 10px 18px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      background: #ecfeff;
      border: 1px solid rgba(44, 122, 123, 0.3);
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: linear-gradient(to right, var(--secondary), var(--primary));
      color: #fff;
    }


    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .hidden {
      display: none;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 22px;
      padding: 10px 18px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      background: #ecfeff;
      border: 1px solid rgba(44, 122, 123, 0.3);
      transition: all 0.25s ease;
    }

    /* Hover Effect */
    .back:hover {
      background: linear-gradient(to right, var(--secondary), var(--primary));
      color: #ffffff;
      transform: translateX(-4px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
    }

    /* TOAST */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      min-width: 260px;
      max-width: 320px;
      padding: 14px 18px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
      z-index: 9999;
      transition: all 0.35s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: linear-gradient(135deg, #16a34a, #15803d);
    }

    .toast.error {
      background: linear-gradient(135deg, #dc2626, #991b1b);
    }

    .toast.info {
      background: linear-gradient(135deg, #2563eb, #1e40af);
    }

    @media (max-width: 576px){
      header{
        padding: 14px;
        font-size: 18px;
      }
      .container{
        margin: 20px auto;
        padding: 0 12px;
      }
      .profile-card{
        padding: 20px;
        border-radius: 14px;
      }
      .profile-header{
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .avatar{
        width: 90px;
        height: 90px;
        font-size: 28px;
      }
      .profile-header h2{
        font-size: 18px;
      }
      .profile-header p{
        font-size: 13px;
      }
      .row{
        flex-direction: column;
        gap: 10px;
      }
      .field{
        min-width: 100%;
      }
      input{
        font-size: 14px;
        padding: 9px;
      }
      .actions{
        flex-direction: column;
      }
      .actions button, .actions a{
        width: 100%;
        justify-content: center;
      }
      .toast{
        right: 10px;
        left: 10px;
        max-width: 100%;
      }
    }

    @media (min-width: 577px) and (max-width: 992px){
      .container{
        padding: 0 20px;
      }
      .profile-card{
        padding: 24px;
      }
      .avatar{
        width: 100px;
        height: 100px;
      }
      .actions{
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>My Profile</h1>
</header>

<div class="container">
  <div class="profile-card">

    <!-- HEADER -->
    <div class="profile-header">
      <div class="avatar clickable" id="avatarBox">
        <img id="avatarImg" src="" alt="Profile Image">
        <span class="avatar-text" id="avatarText">U</span>
        <div class="avatar-overlay">Change</div>
      </div>

      <input type="file" id="avatarInput" accept="image/*" hidden>
      <div>
        <h2 id="fullName">User</h2>
        <p id="emailText">user@email.com</p>
      </div>
    </div>
    
    <!-- VIEW MODE -->
    <div id="viewMode">

      <div class="section">
        <h3>Personal Information</h3>

        <div class="row">
          <div class="field"><label>First Name</label><div id="vFirst">-</div></div>
          <div class="field"><label>Last Name</label><div id="vLast">-</div></div>
        </div>

        <div class="row">
          <div class="field"><label>Phone</label><div id="vPhone">-</div></div>
          <div class="field"><label>Email</label><div id="vEmail">-</div></div>
        </div>
      </div>

      <div class="section">
        <h3>Address</h3>

        <div class="row">
          <div class="field"><label>Street</label><div id="vStreet">-</div></div>
          <div class="field"><label>City/State</label><div id="vCity">-</div></div>
        </div>

        <div class="row">
          <div class="field"><label>ZIP</label><div id="vZip">-</div></div>
          <div class="field"><label>Country</label><div id="vCountry">-</div></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="editBtn">Edit Profile</button>
        <a href="Index.html" class="back">Back to Home</a>
      </div>
    </div>

    <!-- EDIT MODE -->
    <div id="editMode" class="hidden">

      <div class="section">
        <h3>Edit Profile</h3>

        <div class="row">
          <div class="field"><label>First Name</label><input id="eFirst"></div>
          <div class="field"><label>Last Name</label><input id="eLast"></div>
        </div>

        <div class="row">
          <div class="field"><label>Phone</label><input id="ePhone"></div>
          <div class="field"><label>Email</label><input id="eEmail" disabled></div>
        </div>
      </div>

      <div class="section">
        <h3>Address</h3>

        <div class="row">
          <div class="field"><label>Street</label><input id="eStreet"></div>
          <div class="field"><label>City/State</label><input id="eCity"></div>
        </div>

        <div class="row">
          <div class="field"><label>ZIP</label><input id="eZip"></div>
          <div class="field"><label>Country</label><input id="eCountry"></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="saveBtn">Save Changes</button>
        <button class="btn-secondary" id="cancelBtn">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/Profile.js"></script>
</body>
</html>
