<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile | CoffeeCape</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* =========================================
      GLOBAL
    ========================================= */
    body {
      font-family: 'Poppins', sans-serif;
      background: #f9fafc;
      color: #1e293b;
      margin: 0;
      line-height: 1.5;
    }

    /* =========================================
      HEADER
    ========================================= */
    header {
      background: #4f46e5;
      color: #fff;
      padding: 16px 24px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }

    header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
    }

    /* =========================================
      CONTAINER & CARD
    ========================================= */
    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .profile-card {
      background: #fff;
      border-radius: 14px;
      padding: 25px;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
    }

    /* =========================================
      PROFILE HEADER
    ========================================= */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    .avatar {
      position: relative;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      overflow: hidden;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-text {
      font-size: 32px;
      font-weight: 600;
      color: #4f46e5;
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.5);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: .3s ease;
    }

    .avatar.clickable:hover .avatar-overlay {
      opacity: 1;
    }

    /* =========================================
      SECTIONS & FIELDS
    ========================================= */
    .section {
      margin-bottom: 25px;
    }

    .section h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1e293b;
    }

    .row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .field {
      flex: 1;
      min-width: 200px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      font-size: 14px;
      transition: border-color .25s ease;
    }

    .field input:focus {
      border-color: #4f46e5;
      outline: none;
    }

    /* =========================================
      ACTIONS & BUTTONS
    ========================================= */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background .25s ease;
    }

    .btn-primary:hover {
      background: #3730a3;
    }

    .btn-secondary {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      color: #334155;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background .25s ease;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .back {
      font-size: 14px;
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
      align-self: center;
      padding: 10px 18px;
    }

    .back:hover {
      color:#fff;
      background: #4f46e5;
      border-radius: 8px;
    }

    /* =========================================
      UTILITIES
    ========================================= */
    .hidden {
      display: none !important;
    }

    /* =========================================
      TOAST
    ========================================= */
    .toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #334155;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      box-shadow: 0 6px 16px rgba(0,0,0,.15);
      z-index: 10000;
    }

    .toast.show {
      display: block;
    }

    /* =========================================
      VIEW & EDIT MODES
    ========================================= */
    #viewMode {
      animation: fadeIn .3s ease;
    }

    #editMode {
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* =========================================
      RESPONSIVE
    ========================================= */
    @media (max-width: 576px) {
      .profile-header {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .row {
        flex-direction: column;
      }

      .actions {
        flex-direction: column;
        width: 100%;
      }

      .btn-primary,
      .btn-secondary,
      .back {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>My Profile</h1>
</header>

<div class="container">
  <div class="profile-card">

    <!-- HEADER -->
    <div class="profile-header">
      <div class="avatar clickable" id="avatarBox">
        <img id="avatarImg" src="" alt="Profile Image">
        <span class="avatar-text" id="avatarText">U</span>
        <div class="avatar-overlay">Change</div>
      </div>

      <input type="file" id="avatarInput" accept="image/*" hidden>
      <div>
        <h2 id="fullName">User</h2>
        <p id="emailText">user@email.com</p>
      </div>
    </div>
    
    <!-- VIEW MODE -->
    <div id="viewMode">

      <div class="section">
        <h3>Personal Information</h3>

        <div class="row">
          <div class="field"><label>First Name</label><div id="vFirst">-</div></div>
          <div class="field"><label>Last Name</label><div id="vLast">-</div></div>
        </div>

        <div class="row">
          <div class="field"><label>Phone</label><div id="vPhone">-</div></div>
          <div class="field"><label>Email</label><div id="vEmail">-</div></div>
        </div>
      </div>

      <div class="section">
        <h3>Address</h3>

        <div class="row">
          <div class="field"><label>Street</label><div id="vStreet">-</div></div>
          <div class="field"><label>City/State</label><div id="vCity">-</div></div>
        </div>

        <div class="row">
          <div class="field"><label>ZIP</label><div id="vZip">-</div></div>
          <div class="field"><label>Country</label><div id="vCountry">-</div></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="editBtn">Edit Profile</button>
        <a href="Index.html" class="back">Back to Home</a>
      </div>
    </div>

    <!-- EDIT MODE -->
    <div id="editMode" class="hidden">

      <div class="section">
        <h3>Edit Profile</h3>

        <div class="row">
          <div class="field"><label>First Name</label><input id="eFirst"></div>
          <div class="field"><label>Last Name</label><input id="eLast"></div>
        </div>

        <div class="row">
          <div class="field"><label>Phone</label><input id="ePhone"></div>
          <div class="field"><label>Email</label><input id="eEmail" disabled></div>
        </div>
      </div>

      <div class="section">
        <h3>Address</h3>

        <div class="row">
          <div class="field"><label>Street</label><input id="eStreet"></div>
          <div class="field"><label>City/State</label><input id="eCity"></div>
        </div>

        <div class="row">
          <div class="field"><label>ZIP</label><input id="eZip"></div>
          <div class="field"><label>Country</label><input id="eCountry"></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="saveBtn">Save Changes</button>
        <button class="btn-secondary" id="cancelBtn">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/Profile.js"></script>
</body>
</html>
