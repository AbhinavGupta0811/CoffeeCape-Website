<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<link rel="icon" type="image/png" href="assets/logo-image.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", system-ui, sans-serif;
  user-select: none;
}

/* ================= BACKGROUND ================= */
body{
  min-height:100vh;
  background:linear-gradient(120deg,#020617,#020617,#0f172a,#020617);
  background-size:300% 300%;
  animation:bgMove 14s ease infinite;
  color:#fff;
  overflow:hidden;
}

/* background animation */
@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* floating glow effects */
body::before{
  content:"";
  position:absolute;
  width:650px;
  height:650px;
  background:radial-gradient(circle,#22c55e55,transparent 70%);
  top:-250px;
  left:-250px;
  animation:float 10s ease-in-out infinite alternate;
}

body::after{
  content:"";
  position:absolute;
  width:650px;
  height:650px;
  background:radial-gradient(circle,#3b82f655,transparent 70%);
  bottom:-250px;
  right:-250px;
  animation:float 12s ease-in-out infinite alternate-reverse;
}

@keyframes float{
  from{transform:translateY(0)}
  to{transform:translateY(70px)}
}

/* ================= CENTER LOCK ================= */
.center-wrap{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1;
  pointer-events:none;
}

/* ================= CARD ================= */
.box{
  width:450px;
  padding:36px;
  border-radius:22px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 25px 70px rgba(0,0,0,.45);
  animation:cardIn .8s ease;
  pointer-events:auto;
}

@keyframes cardIn{
  from{opacity:0; transform:translateY(30px)}
  to{opacity:1; transform:translateY(0)}
}

h2{
  text-align:center;
  margin-bottom:22px;
  font-size:26px;
  letter-spacing:.5px;
}

/* ================= FORMS ================= */
.form{
  display:none;
  animation:fadeSlide .5s ease;
}
.form.active{display:block}

@keyframes fadeSlide{
  from{opacity:0; transform:translateY(18px)}
  to{opacity:1; transform:translateY(0)}
}

/* ================= OTP ================= */
.otp-container{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin:22px 0;
}

.otp{
  width:52px;
  height:60px;
  font-size:22px;
  text-align:center;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.1);
  color:#fff;
  outline:none;
  transition:.25s;
}

.otp:focus{
  border-color:#22c55e;
  box-shadow:0 0 14px #22c55e88;
  transform:translateY(-2px);
}

.input-group {
  position: relative;
  margin-bottom: 15px;
}

.input-group input {
  width: 100%;
  padding: 12px 40px 12px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
}

.input-group i {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #6b7280;
  font-size: 16px;
  transition: 0.3s ease;
}

.input-group i:hover {
  color: #2c7a7b;
}

/* ================= BUTTON ================= */
button{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  margin-top:12px;
  transition:.25s;
}

button:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 14px 34px #22c55e66;
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

/* ================= TEXT ================= */
p{
  text-align:center;
  font-size:14px;
  opacity:.85;
}

/* ================= TOAST ================= */
.toast{
  position:fixed;
  top:30px;
  right:30px;
  padding:16px 18px;
  border-radius:14px;
  opacity:0;
  transform:translateY(-10px);
  transition:.35s;
  color:#fff;
  z-index:10;
}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success {
  background: linear-gradient(135deg, #16a34a, #15803d);
}
.toast.error {
  background: linear-gradient(135deg, #dc2626, #991b1b);
}
.toast.warning {
  background: linear-gradient(135deg, #f59e0b, #d97706);
}
.toast.info {
  background: linear-gradient(135deg, #2563eb, #1e40af);
}

@media (max-width: 480px){
  body{
    overflow: auto;
  }
  .box{
    padding: 24px;
    border-radius: 18px;
  }
  h2{
    font-size: 20px;
  }
  .otp-container{
    gap: 6px;
  }
  .otp{
    width: 40px;
    height: 50px;
    font-size: 18px;
  }
  input[type = password]{
    padding: 12px;
    font-size: 14px;
  }
  button{
    padding: 12px;
    font-size: 14px;
  }
  p{
    font-size: 13px;
  }
  .toast{
    right: 10px;
    left: 10px;
    top: 20px;
  }
  body::before, body::after{
    width: 400px;
    height: 400px;
  }
}
@media (min-width: 481px) and (max-width: 768px){
  .box{
    padding: 30px;
  }
  .otp{
    width: 46px;
    height: 56px;
  }
}
</style>
</head>
<body>
<div class="center-wrap">
  <div class="box">
    <h2 id="title">Verify OTP</h2>

    <!-- OTP FORM -->
    <div class="form active" id="otpForm">
      <div class="otp-container">
        <input class="otp" maxlength="1">
        <input class="otp" maxlength="1">
        <input class="otp" maxlength="1">
        <input class="otp" maxlength="1">
        <input class="otp" maxlength="1">
        <input class="otp" maxlength="1">
      </div>

      <p>Resend OTP in <span id="time">60</span>s</p>

      <button id="verifyBtn">Verify OTP</button>
      <button id="resendBtn" disabled>Resend OTP</button>
    </div>

    <!-- PASSWORD FORM -->
    <div class="form" id="passwordForm">
      <div class="input-group">
        <input type="password" id="password" placeholder="New password">
        <i class="fa-solid fa-eye toggle-password" data-target="password"></i>
      </div>
      <div class="input-group">
        <input type="password" id="confirm" placeholder="Confirm password">
        <i class="fa-solid fa-eye toggle-password" data-target="confirm"></i>
      </div>
      <button id="resetPassword">Reset Password</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/reset.js"></script>
</body>
</html>
