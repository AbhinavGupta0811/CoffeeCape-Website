<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Refreshments Menu</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <style>
    :root {
      --bg: #f9f5f0;
      --card-bg: #ffffff;
      --accent: #d17a22;
      --accent-dark: #a45716;
      --text: #2b2b2b;
    }

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .close-btn{
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 32px;
      font-weight: bold;
      color: #333;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .close-btn:hover {
      color: #e63946; /* hover effect */
    }


    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      color: var(--accent-dark);
      margin-bottom: 25px;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 80px;
      height: 38px;
      margin-bottom: 10px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--accent);
      transition: .4s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "🍹";
      height: 28px; width: 28px;
      left: 5px; bottom: 5px;
      background-color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 28px;
      transition: .4s;
      font-size: 16px;
    }
    input:checked + .slider {
      background-color: var(--accent-dark);
    }
    input:checked + .slider:before {
      transform: translateX(42px);
      content: "🍔";
    }

    /* Menu grid */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border-radius: 18px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.15);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--accent-dark);
      margin: 10px 0;
    }

    .price {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .card p {
      font-size: 0.95rem;
      margin-bottom: 15px;
      color: #555;
    }

    .order-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border: none;
      padding: 10px;
      color: #fff;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: 0.3s ease;
    }

    .order-btn:hover {
      opacity: 0.9;
      transform: scale(1.05);
    }

    .hidden{
      display: none !important;
    }

    /* #nextBtn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      padding: 14px 22px;
      font-size: 16px;
      border-radius: 30px;
      border: none;
      cursor: not-allowed;
      background: #ccc;
      color: #666;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      z-index: 9999;
      transition: all 0.3s ease;
    }

    #nextBtn.active {
      background: #4a90e2;
      color: #fff;
      cursor: pointer;
    }

    #nextBtn.active:hover {
      background: #357bd8;
    } */

    /* Responsive */
    @media (max-width: 768px) {
      .menu-grid {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }
      .card h2 {
        font-size: 1.2rem;
      }
      .price {
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      .menu-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
      .order-btn {
        font-size: 0.9rem;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <a href="Index.html#menu" class="close-btn">&times;</a>
  <h1>🍴 Refreshments Menu</h1>

  <!-- Toggle Switch -->
  <label class="switch">
    <input type="checkbox" id="menuToggle">
    <span class="slider"></span>
  </label>
  <!-- <p id="menuLabel"><b>Showing: Drinks 🍹</b></p> -->

  <section id="coldDrinksMenu" class="menu-section">
    <div
      class="menu-grid"
      data-category="refreshment-drinks"
    ></div>
  </section>

  <section id="refreshmentMenu" class="menu-section hidden">
    <div
      class="menu-grid"
      data-category="refreshments"
    ></div>
  </section>

  <button id="nextBtn" disabled><i class="fa-solid fa-angle-right"></i>Next</button>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/cart.js" defer></script>
</body>
</html>
