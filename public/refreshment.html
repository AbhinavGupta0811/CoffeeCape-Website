<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Refreshments Menu</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <style>
:root{
    --bg:#fff8f2;
    --surface:#ffffff;
    --primary:#d17a22;
    --primary-dark:#a45716;
    --primary-light:#f6d2a8;
    --success:#22c55e;
    --danger:#ef4444;
    --text:#222222;
    --text-light:#6b7280;
    --border:#ece7df;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    font-family:'Poppins',sans-serif;

    background:
        linear-gradient(
            180deg,
            #fff8f2 0%,
            #fffdf9 100%
        );

    color:var(--text);
}

/* HEADER */

h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(2rem,4vw,3.6rem);
    color:var(--primary-dark);
    text-align:center;
    margin-bottom:30px;
}

/* TOGGLE */
.switch{
    position:relative;
    display:inline-block;

    width:90px;
    height:42px;

    margin-bottom:25px;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    inset:0;

    cursor:pointer;

    border-radius:50px;

    background:
        linear-gradient(
            135deg,
            var(--primary),
            var(--primary-dark)
        );

    transition:.4s;
}

.slider:before{
    content:"🥤";

    position:absolute;

    left:6px;
    bottom:5px;

    width:32px;
    height:32px;

    background:#fff;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:16px;

    transition:.4s;
}

input:checked + .slider:before{
    transform:translateX(45px);
    content:"🍔";
}

/* GRID */

.menu-grid{
    max-width:1400px;
    margin:auto;

    display:grid;

    grid-template-columns:
        repeat(
            auto-fill,
            minmax(320px,1fr)
        );

    gap:28px;
}

/* CARD */

.card{
    background:rgba(255,255,255,.92);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.7);

    border-radius:28px;

    overflow:hidden;

    display:flex;
    flex-direction:column;

    box-shadow:
        0 12px 30px rgba(0,0,0,.08);

    transition:
        transform .4s ease,
        box-shadow .4s ease;
}

.card:hover{
    transform:translateY(-10px);

    box-shadow:
        0 22px 40px rgba(0,0,0,.12);
}

/* IMAGE */

.card-image-wrapper{
    position:relative;
    overflow:hidden;
}

.card img{
    width:100%;
    height:240px;

    object-fit:cover;

    transition:transform .6s ease;
}

.card:hover img{
    transform:scale(1.08);
}

/* BADGE */

.product-badge{
    position:absolute;

    top:15px;
    left:15px;

    background:
        linear-gradient(
            135deg,
            #ff7b54,
            #ff4d6d
        );

    color:#fff;

    padding:8px 14px;

    border-radius:50px;

    font-size:12px;
    font-weight:700;

    z-index:2;
}

/* CARD CONTENT */

.card-content{
    padding:22px;

    display:flex;
    flex-direction:column;

    flex-grow:1;
}

/* PRODUCT HEADER */

.product-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;

    gap:10px;

    margin-bottom:12px;
}

.product-header h2{
    font-family:'Playfair Display',serif;

    font-size:1.45rem;

    color:var(--primary-dark);

    text-align:left;

    line-height:1.4;
}

/* STOCK STATUS */

.stock-status{
    padding:6px 12px;

    border-radius:50px;

    font-size:11px;
    font-weight:700;

    text-transform:uppercase;
}

.stock-status.in{
    background:#dcfce7;
    color:var(--success);
}

.stock-status.out{
    background:#fee2e2;
    color:var(--danger);
}

/* META */

.product-meta{
    display:flex;
    flex-wrap:wrap;

    gap:12px;

    margin-bottom:15px;
}

.product-meta span{
    display:flex;
    align-items:center;
    gap:6px;

    font-size:.85rem;

    color:var(--text-light);
}

.product-meta i{
    color:var(--primary);
}

/* DESCRIPTION */

.product-description{
    text-align:left;

    color:#555;

    font-size:.92rem;

    line-height:1.8;

    margin-bottom:18px;
}

/* EXTRA INFO */

.product-extra-info{
    background:#faf7f2;

    border:1px solid var(--border);

    border-radius:14px;

    padding:12px;

    display:grid;
    gap:8px;

    margin-bottom:18px;

    text-align:left;
}

.product-extra-info strong{
    color:var(--text);
}

/* PRICE */

.product-price{
    display:flex;
    align-items:center;

    gap:10px;

    margin-top:auto;
    margin-bottom:20px;
}

.offer-price{
    font-size:1.7rem;
    font-weight:800;
    color:var(--primary);
}

.original-price{
    color:#9ca3af;
    text-decoration:line-through;
}

/* BUTTON */

.order-btn{
    width:100%;

    border:none;

    border-radius:16px;

    padding:14px;

    background:
        linear-gradient(
            135deg,
            var(--primary),
            var(--primary-dark)
        );

    color:#fff;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    transition:.3s ease;
}

.order-btn:hover{
    transform:translateY(-2px);

    box-shadow:
        0 10px 25px rgba(209,122,34,.35);
}

.order-btn:disabled{
    background:#d1d5db;
    color:#6b7280;
    cursor:not-allowed;
    box-shadow:none;
}

/* HIDDEN */

.hidden{
    display:none !important;
}

/* TABLET */

@media(max-width:768px){

    .menu-grid{
        grid-template-columns:
            repeat(
                auto-fill,
                minmax(250px,1fr)
            );
    }

    .card img{
        height:220px;
    }

    .product-header h2{
        font-size:1.25rem;
    }

    .offer-price{
        font-size:1.4rem;
    }
}

/* MOBILE */

@media(max-width:480px){

    body{
        padding:15px;
    }

    .menu-grid{
        grid-template-columns:1fr;
        gap:18px;
    }

    .card-content{
        padding:18px;
    }

    .product-header{
        flex-direction:column;
        align-items:flex-start;
    }

    .card img{
        height:220px;
    }

    .offer-price{
        font-size:1.3rem;
    }

    .order-btn{
        padding:13px;
        font-size:.95rem;
    }
}
</style>
</head>
<body>
  <header>
    <div id="header-container"></div>
  </header>
  <h1>🍴 Refreshments Menu</h1>

  <!-- Toggle Switch -->
  <label class="switch">
    <input type="checkbox" id="menuToggle">
    <span class="slider"></span>
  </label>
  <!-- <p id="menuLabel"><b>Showing: Drinks 🍹</b></p> -->

  <section id="coldDrinksMenu" class="menu-section">
    <div
      class="menu-grid"
      data-category="refreshment-drinks"
    ></div>
  </section>

  <section id="refreshmentMenu" class="menu-section hidden">
    <div
      class="menu-grid"
      data-category="refreshments"
    ></div>
  </section>

  <footer>
    <div id="footer-container"></div>
  </footer>

  <button id="nextBtn" disabled><i class="fa-solid fa-angle-right"></i>Next</button>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/common.js"></script>
  <script src="js/cart.js" defer></script>
</body>
</html>
