<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Refreshments Menu</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/util.css">
</head>
<body>
  <header>
    <div id="header-container"></div>
  </header>
  <h1>🍴 Refreshments Menu</h1>

  <!-- Toggle Switch -->
  <label class="switch">
    <input type="checkbox" id="menuToggle">
    <span class="slider"></span>
  </label>
  <!-- <p id="menuLabel"><b>Showing: Drinks 🍹</b></p> -->

  <section id="coldDrinksMenu" class="menu-section">
    <div
      class="menu-grid"
      data-category="refreshment-drinks"
    ></div>
  </section>

  <section id="refreshmentMenu" class="menu-section hidden">
    <div
      class="menu-grid"
      data-category="refreshments"
    ></div>
  </section>

  <footer>
    <div id="footer-container"></div>
  </footer>

  <button id="nextBtn" disabled><i class="fa-solid fa-angle-right"></i>Next</button>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/common.js"></script>
  <script src="js/cart.js" defer></script>
</body>
</html>
