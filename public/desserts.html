<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Desserts Menu</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <style>
:root{
    --bg:#fff8f0;
    --surface:#ffffff;
    --accent:#d17a22;
    --accent-dark:#a45716;
    --accent-light:#f3c17f;
    --text:#2b2b2b;
    --text-light:#6b7280;
    --success:#16a34a;
    --danger:#dc2626;
    --border:#ece7df;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    font-family:'Poppins',sans-serif;
    background:
        radial-gradient(circle at top left,#fff4e5,#fff8f0 45%);
    color:var(--text);
    min-height:100vh;
    padding:25px;
}

/* HEADER */

h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(2rem,4vw,3.5rem);
    color:var(--accent-dark);
    text-align:center;
    margin-bottom:35px;
    letter-spacing:.5px;
}

.close-btn{
    position:fixed;
    top:20px;
    right:20px;

    width:48px;
    height:48px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:50%;

    background:#fff;

    color:#444;

    text-decoration:none;

    font-size:28px;
    font-weight:700;

    box-shadow:
        0 8px 20px rgba(0,0,0,.1);

    transition:.35s ease;

    z-index:1000;
}

.close-btn:hover{
    background:#e63946;
    color:#fff;
    transform:rotate(90deg);
}

/* GRID */

.menu-grid{
    width:100%;
    max-width:1400px;
    margin:auto;

    display:grid;

    grid-template-columns:
        repeat(
            auto-fill,
            minmax(320px,1fr)
        );

    gap:28px;
}

/* CARD */

.card{
    background:rgba(255,255,255,.92);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.7);

    border-radius:28px;

    overflow:hidden;

    display:flex;
    flex-direction:column;

    transition:
        transform .4s ease,
        box-shadow .4s ease;

    box-shadow:
        0 10px 30px rgba(0,0,0,.08);
}

.card:hover{
    transform:translateY(-10px);

    box-shadow:
        0 20px 40px rgba(0,0,0,.12);
}

/* IMAGE */

.card-image-wrapper{
    position:relative;
    overflow:hidden;
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;

    transition:transform .6s ease;
}

.card:hover img{
    transform:scale(1.08);
}

/* BADGE */

.product-badge{
    position:absolute;
    top:15px;
    left:15px;

    background:
        linear-gradient(
            135deg,
            #ff7b54,
            #ff4d6d
        );

    color:#fff;

    padding:8px 14px;

    border-radius:50px;

    font-size:12px;
    font-weight:700;

    letter-spacing:.5px;

    box-shadow:
        0 5px 15px rgba(0,0,0,.15);

    z-index:2;
}

/* CONTENT */

.card-content{
    padding:22px;

    display:flex;
    flex-direction:column;

    flex-grow:1;
}

/* HEADER */

.product-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;

    margin-bottom:12px;
}

.product-header h2{
    font-family:'Playfair Display',serif;
    font-size:1.45rem;
    color:var(--accent-dark);
    text-align:left;
    line-height:1.4;
}

/* STOCK */

.stock-status{
    padding:6px 12px;

    border-radius:50px;

    font-size:11px;
    font-weight:700;

    text-transform:uppercase;

    white-space:nowrap;
}

.stock-status.in{
    background:#dcfce7;
    color:var(--success);
}

.stock-status.out{
    background:#fee2e2;
    color:var(--danger);
}

/* META */

.product-meta{
    display:flex;
    flex-wrap:wrap;
    gap:12px;

    margin-bottom:16px;
}

.product-meta span{
    display:flex;
    align-items:center;
    gap:6px;

    font-size:.85rem;
    color:var(--text-light);
}

.product-meta i{
    color:var(--accent);
}

/* DESCRIPTION */

.product-description{
    text-align:left;

    color:#555;

    line-height:1.8;

    font-size:.92rem;

    margin-bottom:18px;
}

/* EXTRA INFO */

.product-extra-info{
    background:#faf7f2;

    border:1px solid var(--border);

    border-radius:14px;

    padding:12px;

    display:grid;

    gap:8px;

    text-align:left;

    margin-bottom:18px;
}

.product-extra-info div{
    font-size:.88rem;
    color:#555;
}

.product-extra-info strong{
    color:var(--text);
}

/* PRICE */

.product-price{
    display:flex;
    align-items:center;
    gap:10px;

    margin-top:auto;
    margin-bottom:20px;
}

.offer-price{
    font-size:1.7rem;
    font-weight:800;
    color:var(--accent);
}

.original-price{
    color:#9ca3af;
    text-decoration:line-through;
    font-size:1rem;
}

/* BUTTON */

.order-btn{
    width:100%;

    border:none;

    border-radius:16px;

    padding:14px;

    background:
        linear-gradient(
            135deg,
            var(--accent),
            var(--accent-dark)
        );

    color:#fff;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    transition:.3s ease;
}

.order-btn:hover{
    transform:translateY(-2px);

    box-shadow:
        0 10px 25px rgba(209,122,34,.35);
}

.order-btn:disabled{
    background:#d1d5db;
    color:#6b7280;
    cursor:not-allowed;
    box-shadow:none;
}

/* HIDDEN */

.hidden{
    display:none !important;
}

/* TABLET */

@media(max-width:768px){

    .menu-grid{
        grid-template-columns:
            repeat(
                auto-fill,
                minmax(250px,1fr)
            );
    }

    .card img{
        height:220px;
    }

    .product-header h2{
        font-size:1.25rem;
    }

    .offer-price{
        font-size:1.4rem;
    }
}

/* MOBILE */

@media(max-width:480px){

    body{
        padding:15px;
    }

    .menu-grid{
        grid-template-columns:1fr;
        gap:18px;
    }

    .card-content{
        padding:18px;
    }

    .card img{
        height:220px;
    }

    .product-header{
        flex-direction:column;
        align-items:flex-start;
    }

    .offer-price{
        font-size:1.3rem;
    }

    .order-btn{
        padding:13px;
        font-size:.95rem;
    }
}
</style>
</head>
<body>
  <a href="Index.html#menu" class="close-btn">&times;</a>
  <h1>🍨 Desserts Menu</h1>
 
  <section class="menu-section">
    <div class="menu-grid" data-category="desserts"></div>
  </section>

  <button id="nextBtn" disabled><i class="fa-solid fa-angle-right"></i>Next</button>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/cart.js" defer></script>
</body>
</html>
