<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>
<link rel="icon" type="image/png" href="assets/logo-image.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= GLOBAL ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("assets/background-image.png") center/cover no-repeat;
position:relative;
}

/* DARK OVERLAY */

body::before{
content:"";
position:absolute;
inset:0;
/* background:rgba(53, 53, 53, 0.65); */
/* backdrop-filter: blur(1px); */
}

/* ================= CARD ================= */

.container{
position:relative;
z-index:2;
width:380px;
padding:40px;
border-radius:20px;
background:rgba(78, 78, 78, 0.123);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
color:white;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* CLOSE BUTTON */

.close-home{
position:absolute;
top:18px;
right:22px;
font-size:28px;
color:#fff;
text-decoration:none;
opacity:.8;
}

.close-home:hover{
opacity:1;
}

/* TITLE */

.container h2{
margin-bottom:25px;
font-weight:600;
letter-spacing:1px;
}

/* ================= INPUT ================= */

.input-box{
position:relative;
margin-bottom:20px;
}

.input-box i{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
color:#bbb;
}

.input-box input{
width:100%;
padding:12px 12px 12px 40px;
border-radius:30px;
border:none;
outline:none;

background:rgba(255,255,255,0.15);
color:white;
}

.input-box input::placeholder{
color:#ddd;
}

/* ================= BUTTON ================= */

button{
width:100%;
padding:12px;
border-radius:30px;
border:none;
cursor:pointer;

background:linear-gradient(135deg,#d4a373,#8b5e34);
color:white;

font-weight:600;
letter-spacing:.5px;

transition:.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 6px 20px rgba(0,0,0,.4);
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

/* ================= TOAST ================= */

.toast{
position:fixed;
top:25px;
right:25px;
padding:14px 18px;
border-radius:10px;
color:#fff;
font-size:14px;
opacity:0;
transform:translateY(-20px);
transition:.4s;
z-index:999;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

.toast.success{
background:#16a34a;
}

.toast.error{
background:#dc2626;
}

/* ================= MOBILE ================= */

@media(max-width:480px){

.container{
width:90%;
padding:28px;
}

}

</style>
</head>

<body>

<div class="container">

    <a href="Auth.html" class="close-home">&times;</a>

    <h2>Forgot Password</h2>
    <form id="forgotForm">
        <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <button id="sendBtn">
            Send OTP
        </button>
    </form>
</div>

<div id="toast" class="toast"></div>

<script src="js/forget.js"></script>

</body>
</html>
