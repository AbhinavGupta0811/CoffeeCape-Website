<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoffeeCape | Secure Payment</title>
<link rel="icon" type="image/png" href="assets/logo-image.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="css/payment.css">
<style>
  /* Hidden until payment.js confirms this isn't a reload/re-access */
  html.pay-guard-pending body { visibility: hidden; }
</style>
<script>
  // Runs before body renders, so a blocked reload never flashes the form.
  document.documentElement.classList.add("pay-guard-pending");
</script>
</head>
<body>

  <div class="container">

    <h1><i class="fa-sharp fa-solid fa-lock"></i>Secure Payment – CoffeeCape </h1>

    <div class="amount-box">
      <div>
        <strong id="paymentTitle">Payment</strong><br>
        ID: <span id="referenceId">----</span>
      </div>
      <div class="amount">
        ₹<span id="payAmount">0.00</span>
      </div>
    </div>

    <!-- ================= ORDER PAYMENT ================= -->
    <form id="orderPaymentSection" style="display:none;">

      <h3>Order Payment Methods</h3>

      <!-- 1. UPI -->
      <div class="method-card active">
        <label class="method">
          <input type="radio" name="orderMethod" value="upi" checked>
          <div class="icon upi"><i class="fa-brands fa-google-pay"></i></div>
          <div><strong>UPI</strong></div>
        </label>
        <div class="details">
          <input type="text" style="width: 97%;" name="upiId" placeholder="example@upi">
        </div>
      </div>

      <!-- 2. Card -->
      <div class="method-card">
        <label class="method">
          <input type="radio" name="orderMethod" value="card">
          <div class="icon card"><i class="fa-solid fa-credit-card"></i></div>
          <div><strong>Credit/Debit Card</strong></div>
        </label>
        <div class="details">
          <input type="text" style="width: 97%;" name="cardNumber" placeholder="Card Number">
          <input type="text" style="width: 97%;" name="cardName" placeholder="Card Holder Name">
          <div class="row">
            <input type="text" style="width: 48%;" name="expiry" placeholder="MM/YY">
            <input type="password" style="width: 48%;" name="cvv" placeholder="CVV">
          </div>
        </div>
      </div>

      <!-- 3. Net Banking -->
      <div class="method-card">
        <label class="method">
          <input type="radio" name="orderMethod" value="netbanking">
          <div class="icon net"><i class="fa-solid fa-building-columns"></i></div>
          <div><strong>Net Banking</strong></div>
        </label>
        <div class="details">
          <select name="bank">
            <option value="">Select Bank</option>
            <option>SBI</option>
            <option>HDFC</option>
            <option>ICICI</option>
            <option>AXIS</option>
          </select>
        </div>
      </div>

      <!-- 4. Wallet -->
      <div class="method-card">
        <label class="method">
          <input type="radio" name="orderMethod" value="wallet">
          <div class="icon wallet"><i class="fa-solid fa-wallet"></i></div>
          <div><strong>Wallet</strong></div>
        </label>
        <div class="details">
          <select name="wallet">
            <option value="">Select Wallet</option>
            <option>Paytm</option>
            <option>Amazon Pay</option>
            <option>Mobikwik</option>
          </select>
          <input type="text" style="width: 97%;" placeholder="Registered Mobile">
        </div>
      </div>

      <!-- 5. COD -->
      <div class="method-card">
        <label class="method">
          <input type="radio" name="orderMethod" value="cod">
          <div class="icon cod"><i class="fa-solid fa-money-bill-wave"></i></div>
          <div><strong>Cash on Delivery</strong></div>
        </label>
        <div class="details">
          <textarea rows="2" style="width: 97%;" placeholder="Delivery Instructions"></textarea>
        </div>
      </div>

    </form>

    <!-- ================= BOOKING PAYMENT ================= -->
    <form id="bookingPaymentSection" style="display:none;">

      <h3>Booking Advance Payment (50%)</h3>

      <p style="color:#777;font-size:14px;margin-bottom:15px;">
        Advance amount (50% of total booking price)
      </p>

      <!-- 5 PROFESSIONAL METHODS AGAIN -->

      <div class="method-card active">
        <label class="method">
          <input type="radio" name="bookingMethod" value="upi" checked>
          <div class="icon upi"><i class="fa-brands fa-google-pay"></i></div>
          <div><strong>UPI</strong></div>
        </label>
        <div class="details">
          <input type="text" style="width: 97%;" name="upiId" placeholder="example@upi">
        </div>
      </div>

      <div class="method-card">
        <label class="method">
          <input type="radio" name="bookingMethod" value="card">
          <div class="icon card"><i class="fa-solid fa-credit-card"></i></div>
          <div><strong>Card</strong></div>
        </label>
        <div class="details">
          <input type="text" style="width: 97%;" name="cardNumber" placeholder="Card Number">
          <input type="text" style="width: 97%;" name="cardName" placeholder="Card Holder Name">
          <div class="row">
            <input type="text" style="width: 48%;" name="expiry" placeholder="MM/YY">
            <input type="password" style="width: 48%;" name="cvv" placeholder="CVV">
          </div>
        </div>
      </div>

      <div class="method-card">
        <label class="method">
          <input type="radio" name="bookingMethod" value="netbanking">
          <div class="icon net"><i class="fa-solid fa-building-columns"></i></div>
          <div><strong>Net Banking</strong></div>
        </label>
        <div class="details">
          <select>
            <option value="">Select Bank</option>
            <option>SBI</option>
            <option>HDFC</option>
            <option>ICICI</option>
            <option>AXIS</option>
          </select>
        </div>
      </div>

      <div class="method-card">
        <label class="method">
          <input type="radio" name="bookingMethod" value="wallet">
          <div class="icon wallet"><i class="fa-solid fa-wallet"></i></div>
          <div><strong>Wallet</strong></div>
        </label>
        <div class="details">
          <select>
            <option value="">Select Wallet</option>
            <option>Paytm</option>
            <option>Amazon Pay</option>
            <option>Mobikwik</option>
          </select>
          <input type="text" style="width: 97%;" placeholder="Registered Mobile">
        </div>
      </div>

    </form>

  </div>

  <div class="paybar">
    <!-- <button class="back-btn" id="backBtn">← Back</button> -->

    <div class="secure">
    <i class="fa-solid fa-lock"></i> 256-bit SSL Secure Payment
    </div>

    <button class="pay-btn" id="payBtn">
      Pay ₹<span id="payAmountBtn">0.00</span>
    </button>
  </div>

  <!-- Backend Payment Logic -->
  <script src="js/payment.js"></script>
</body>
</html>
