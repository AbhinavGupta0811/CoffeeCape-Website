<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Burger & Fries Menu</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <style>
    :root{
        --bg:#faf6f1;
        --surface:#ffffff;
        --primary:#d17a22;
        --primary-dark:#6f4e37;
        --primary-light:#f5d3a5;
        --text:#2b2b2b;
        --text-muted:#6b7280;
        --success:#16a34a;
        --danger:#dc2626;
        --border:#ebe5dc;
        --shadow:0 15px 35px rgba(0,0,0,.08);
    }

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        user-select:none;
    }

    body{
        font-family:'Poppins',sans-serif;
        background:
            radial-gradient(
                circle at top left,
                #fffdf8,
                #faf6f1 45%
            );
        color:var(--text);
    }

    /* PAGE TITLE */

    h1{
        font-family:'Playfair Display',serif;
        font-size:clamp(2rem,4vw,3.8rem);
        color:var(--primary-dark);
        text-align:center;
        margin-bottom:30px;
        letter-spacing:.5px;
    }


    /* TOGGLE */
    .switch-box{
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    
    .switch{
        position:relative;
        display:inline-block;

        width:90px;
        height:42px;

        margin-bottom:25px;
    }

    .switch input{
        display:none;
    }

    .slider{
        position:absolute;
        inset:0;

        cursor:pointer;

        border-radius:50px;

        background:
            linear-gradient(
                135deg,
                var(--primary),
                var(--primary-dark)
            );

        transition:.4s;
    }

    .slider:before{
        content:"🍔";

        position:absolute;

        left:5px;
        bottom:5px;

        width:32px;
        height:32px;

        background:#fff;

        border-radius:50%;

        display:flex;
        align-items:center;
        justify-content:center;

        font-size:16px;

        transition:.4s ease;
    }

    input:checked + .slider{
        background:
            linear-gradient(
                135deg,
                #f1c40f,
                #f39c12
            );
    }

    input:checked + .slider:before{
        transform:translateX(48px);
        content:"🍟";
    }

    /* PRODUCT GRID */

    .menu-grid{
        width:100%;
        max-width:1400px;
        margin:auto;

        display:grid;

        grid-template-columns:
            repeat(
                auto-fill,
                minmax(320px,1fr)
            );

        gap:28px;
    }

    /* CARD */

    .card{
        background:rgba(255,255,255,.95);

        backdrop-filter:blur(12px);

        border:1px solid rgba(255,255,255,.7);

        border-radius:28px;

        overflow:hidden;

        display:flex;
        flex-direction:column;

        box-shadow:var(--shadow);

        transition:
            transform .4s ease,
            box-shadow .4s ease;
    }

    .card:hover{
        transform:translateY(-10px);

        box-shadow:
            0 22px 45px rgba(0,0,0,.12);
    }

    /* IMAGE */

    .card-image-wrapper{
        position:relative;
        overflow:hidden;
    }

    .card img{
        width:100%;
        height:240px;

        object-fit:cover;

        transition:transform .6s ease;
    }

    .card:hover img{
        transform:scale(1.08);
    }

    /* BADGE */

    .product-badge{
        position:absolute;

        top:15px;
        left:15px;

        background:
            linear-gradient(
                135deg,
                #ff7b54,
                #ff4d6d
            );

        color:#fff;

        padding:8px 14px;

        border-radius:30px;

        font-size:12px;
        font-weight:700;

        letter-spacing:.5px;

        z-index:5;
    }

    /* CARD CONTENT */

    .card-content{
        padding:22px;

        display:flex;
        flex-direction:column;

        flex-grow:1;
    }

    /* PRODUCT HEADER */

    .product-header{
        display:flex;
        justify-content:space-between;
        align-items:flex-start;

        gap:12px;

        margin-bottom:14px;
    }

    .product-header h2{
        font-family:'Playfair Display',serif;

        font-size:1.45rem;

        color:var(--primary-dark);

        text-align:left;

        line-height:1.4;
    }

    /* STOCK STATUS */

    .stock-status{
        padding:6px 12px;

        border-radius:50px;

        font-size:11px;
        font-weight:700;

        text-transform:uppercase;

        white-space:nowrap;
    }

    .stock-status.in{
        background:#dcfce7;
        color:var(--success);
    }

    .stock-status.out{
        background:#fee2e2;
        color:var(--danger);
    }

    /* PRODUCT META */

    .product-meta{
        display:flex;
        flex-wrap:wrap;

        gap:12px;

        margin-bottom:15px;
    }

    .product-meta span{
        display:flex;
        align-items:center;
        gap:6px;

        color:var(--text-muted);

        font-size:.85rem;
    }

    .product-meta i{
        color:var(--primary);
    }

    /* DESCRIPTION */

    .product-description{
        text-align:left;

        color:#555;

        font-size:.92rem;

        line-height:1.8;

        margin-bottom:18px;
    }

    /* EXTRA INFO */

    .product-extra-info{
        background:#faf7f2;

        border:1px solid var(--border);

        border-radius:14px;

        padding:12px;

        display:grid;
        gap:8px;

        text-align:left;

        margin-bottom:18px;
    }

    .product-extra-info div{
        font-size:.88rem;
        color:#555;
    }

    .product-extra-info strong{
        color:var(--text);
    }

    /* PRICE */

    .product-price{
        display:flex;
        align-items:center;

        gap:10px;

        margin-top:auto;
        margin-bottom:20px;
    }

    .offer-price{
        font-size:1.8rem;
        font-weight:800;
        color:var(--primary);
    }

    .original-price{
        font-size:1rem;

        color:#9ca3af;

        text-decoration:line-through;
    }

    /* BUTTON */

    .order-btn{
        width:100%;

        border:none;

        border-radius:16px;

        padding:14px;

        background:
            linear-gradient(
                135deg,
                var(--primary),
                var(--primary-dark)
            );

        color:#fff;

        font-size:1rem;
        font-weight:700;

        cursor:pointer;

        transition:.3s ease;
    }

    .order-btn:hover{
        transform:translateY(-2px);

        box-shadow:
            0 12px 25px rgba(209,122,34,.35);
    }

    .order-btn:disabled{
        background:#d1d5db;
        color:#6b7280;
        cursor:not-allowed;
        box-shadow:none;
    }

    /* HIDDEN */

    .hidden{
        display:none !important;
    }

    /* TABLET */

    @media(max-width:768px){

        .menu-grid{
            grid-template-columns:
                repeat(
                    auto-fill,
                    minmax(250px,1fr)
                );
        }

        .card img{
            height:220px;
        }

        .product-header h2{
            font-size:1.25rem;
        }

        .offer-price{
            font-size:1.5rem;
        }
    }

    /* MOBILE */

    @media(max-width:480px){

        body{
            padding:15px;
        }

        .menu-grid{
            grid-template-columns:1fr;
            gap:18px;
        }

        .card-content{
            padding:18px;
        }

        .card img{
            height:220px;
        }

        .product-header{
            flex-direction:column;
            align-items:flex-start;
        }

        .offer-price{
            font-size:1.35rem;
        }

        .order-btn{
            padding:13px;
            font-size:.95rem;
        }

        .switch{
            transform:scale(.95);
        }
    }
</style>
</head>
<body>
  <header>
    <div id="header-container"></div>
  </header>
  <h1>🍔 Burger & 🍟 Fries</h1>

  <div class="switch-box">
    <!-- <span>🍔 Burgers</span> -->

    <label class="switch" for="menuToggle">
      <input type="checkbox" id="menuToggle">
      <span class="slider"></span>
    </label>

    <!-- <span>🍟 Fries</span> -->
  </div>

  <!-- BURGER MENU -->
  <section id="burgersMenu" class="menu-section">
    <div class="menu-grid" data-category="burgers"></div>
  </section>

  <!-- FRIES MENU -->
  <section id="friesMenu" class="menu-section hidden">
    <div class="menu-grid" data-category="fries"></div>
  </section>

  <footer>
    <div id="footer-container"></div>
  </footer>

  <button id="nextBtn" style="user-select:none;" disabled>
    <i class="fa-solid fa-angle-right"></i>Next
  </button>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/common.js"></script>
  <script src="js/cart.js" defer></script>
</body>
</html>
