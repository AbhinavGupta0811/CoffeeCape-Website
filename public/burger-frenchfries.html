<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Burger & Fries Menu</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/util.css">
</head>
<body>
  <header>
    <div id="header-container"></div>
  </header>
  <h1>🍔 Burger & 🍟 Fries</h1>

  <div class="switch-box">
    <!-- <span>🍔 Burgers</span> -->

    <label class="switch" for="menuToggle">
      <input type="checkbox" id="menuToggle">
      <span class="slider"></span>
    </label>

    <!-- <span>🍟 Fries</span> -->
  </div>

  <!-- BURGER MENU -->
  <section id="burgersMenu" class="menu-section">
    <div class="menu-grid" data-category="burgers"></div>
  </section>

  <!-- FRIES MENU -->
  <section id="friesMenu" class="menu-section hidden">
    <div class="menu-grid" data-category="fries"></div>
  </section>

  <footer>
    <div id="footer-container"></div>
  </footer>

  <button id="nextBtn" style="user-select:none;" disabled>
    <i class="fa-solid fa-angle-right"></i>Next
  </button>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/common.js"></script>
  <script src="js/cart.js" defer></script>
</body>
</html>
