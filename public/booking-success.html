<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1f4037, #99f2c8);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.success-card {
    background: #fff;
    border-radius: 20px;
    padding: 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    text-align: center;
}

.success-icon {
    font-size: 60px;
    color: #28a745;
    margin-bottom: 20px;
}

.booking-id {
    font-weight: bold;
    font-size: 20px;
    color: #333;
}

.btn-home {
    background-color: #1f4037;
    color: white;
    border-radius: 50px;
    padding: 10px 25px;
}

.btn-home:hover {
    color: #fff;
    background-color: #16352d;
}
</style>
</head>
<body>

<div class="success-card">

    <div class="success-icon">
        <i class="fa-solid fa-circle-check"></i>
    </div>

    <h2>Booking Confirmed!</h2>
    <p class="text-muted">Your reservation has been successfully recorded.</p>

    <hr>

    <p class="booking-id">Booking ID: <span id="bookingId">---</span></p>
    <p>Event: <strong id="eventType">---</strong></p>
    <p>Date: <strong id="eventDate">---</strong></p>
    <p>Time: <strong id="eventTime">---</strong></p>

    <div class="mt-4">
        <a href="index.html" class="btn btn-home me-2">
          <i class="fa-solid fa-house me-1"></i> Home
        </a>

        <a href="My-Activity.html#bookingsTab" class="btn btn-outline-dark">
          <i class="fa-solid fa-calendar me-1"></i> View Bookings
        </a>
    </div>

</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const bookingId = params.get("bookingId");

  if (!bookingId) {
    alert("Invalid booking reference");
  }

  document.getElementById("bookingId").innerText = bookingId;

  async function loadBookingDetails() {
    try {

      const res = await fetch(`/api/booking/details/${bookingId}`, {
        credentials: "include"
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.message || "Booking not found");
        return;
      }

      const booking = data.booking || data;

      let bookingData = {};

      if (booking.booking_data) {
        bookingData =
          typeof booking.booking_data === "string"
            ? JSON.parse(booking.booking_data)
            : booking.booking_data;
      }

      const eventTypeEl = document.getElementById("eventType");
      const eventDateEl = document.getElementById("eventDate");
      const eventTimeEl = document.getElementById("eventTime");

      if (eventTypeEl) {
        eventTypeEl.innerText =
          booking.event_type ||
          bookingData.eventType ||
          "-";
      }

      if (eventDateEl) {
        const rawDate =
          booking.event_date ||                    // DB column (preferred)
          bookingData.eventDate ||                 // JSON field
          bookingData.reservationDate ||           // Dinner/Karaoke fallback
          null;

        eventDateEl.innerText = rawDate
          ? new Date(rawDate).toLocaleDateString("en-IN")
          : "-";
      }

      if (eventTimeEl) {
        const rawTime =
          booking.event_time ||                    // DB column (preferred)
          bookingData.eventTime ||                 // JSON field
          null;

        eventTimeEl.innerText = rawTime || "-";
      }

    } catch (err) {
      console.error("Load Booking Error:", err);
      alert("Something went wrong");
    }
  }

  loadBookingDetails();
</script>
</body>
</html>
