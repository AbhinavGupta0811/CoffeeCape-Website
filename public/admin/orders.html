<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Admin | Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="admin-wrapper">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2 class="logo">CoffeeCape</h2>

    <nav>
      <a href="dashboard.html">
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </a>

      <a href="user.html">
        <i class="fa-solid fa-users"></i> Users
      </a>

      <a href="orders.html" class="active">
        <i class="fa-solid fa-box"></i> Orders
      </a>

      <a href="booking.html">
        <i class="fa-solid fa-calendar-check"></i> Bookings
      </a>

      <a href="messages.html">
        <i class="fa-solid fa-envelope"></i> Messages
      </a>

      <a href="setting.html">
        <i class="fa-solid fa-gear"></i> Settings
      </a>
    </nav>

  </aside>


  <!-- MAIN CONTENT -->
  <main class="main-content">

    <div class="page-header">
      <h2>Order Management</h2>
      <p>Manage customer orders and refunds</p>
    </div>


    <!-- ORDER FILTER -->
    <div class="orders-filters">

      <button id="activeOrdersBtn" class="filter-btn active">
        Active Orders
      </button>

      <button id="pastOrdersBtn" class="filter-btn">
        Past Orders
      </button>

    </div>


    <!-- TABLE -->
    <div class="table-container">

      <table class="admin-table">

        <thead>

          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Total</th>
            <th>Status</th>
            <th>Payment</th>
            <th>Actions</th>
            <th>Buttons</th>
          </tr>

        </thead>


        <tbody id="ordersTableBody">
        </tbody>

      </table>
        <!-- EMPTY STATE -->
        <div id="emptyState">
          No orders found
        </div>
    </div>
  </main>
</div>


<!-- ORDER MODAL -->
<div id="orderModal" class="modal-overlay">

  <div class="modal-box">

    <span id="closeOrderModal" class="close-btn">
      &times;
    </span>

    <h3>Order Details</h3>

    <div id="orderModalContent" class="modal-content"></div>

  </div>

</div>


<!-- UI NOTIFICATIONS -->

<div id="bottomSlider"></div>
<div id="toastContainer"></div>


<!-- SCRIPTS -->

<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script src="js/admin-orders.js"></script>

</body>
</html>
