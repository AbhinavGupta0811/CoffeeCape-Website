<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Special Combos</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <style>
:root{
    --bg:#f8f5f1;
    --surface:#ffffff;
    --primary:#d17a22;
    --primary-dark:#6f4e37;
    --primary-light:#f4d3a8;
    --success:#22c55e;
    --danger:#ef4444;
    --text:#2b2b2b;
    --text-light:#6b7280;
    --border:#ece7df;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    font-family:'Poppins',sans-serif;
    background:
        linear-gradient(
            180deg,
            #fffaf5 0%,
            #f8f5f1 100%
        );

    color:var(--text);
}

/* HEADER */

h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(2rem,4vw,3.8rem);
    color:var(--primary-dark);
    text-align:center;
    margin-bottom:35px;
    letter-spacing:.5px;
}

/* GRID */
.menu-grid,
.combo-grid{
    width:100%;
    max-width:1400px;
    margin:auto;

    display:grid;

    grid-template-columns:
        repeat(
            auto-fill,
            minmax(320px,1fr)
        );

    gap:28px;
}

/* CARD */

.card,
.combo-card{
    background:rgba(255,255,255,.95);

    backdrop-filter:blur(10px);

    border-radius:28px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.7);

    box-shadow:
        0 12px 30px rgba(0,0,0,.08);

    transition:
        transform .4s ease,
        box-shadow .4s ease;

    display:flex;
    flex-direction:column;
}

.card:hover,
.combo-card:hover{
    transform:translateY(-10px);

    box-shadow:
        0 20px 40px rgba(0,0,0,.12);
}

/* IMAGE */

.card-image-wrapper{
    position:relative;
    overflow:hidden;
}

.card img,
.combo-card img{
    width:100%;
    height:240px;

    object-fit:cover;

    transition:transform .6s ease;
}

.card:hover img,
.combo-card:hover img{
    transform:scale(1.08);
}

/* PRODUCT BADGE */

.product-badge{
    position:absolute;
    top:15px;
    left:15px;

    background:
        linear-gradient(
            135deg,
            #ff7b54,
            #ff4d6d
        );

    color:#fff;

    padding:8px 14px;

    border-radius:50px;

    font-size:12px;
    font-weight:700;

    z-index:3;
}

/* COMBO BADGE */

.combo-badge{
    position:absolute;

    top:15px;
    right:15px;

    background:#e8f5e9;

    color:#2e7d32;

    padding:8px 14px;

    border-radius:50px;

    display:flex;
    align-items:center;
    gap:6px;

    font-size:12px;
    font-weight:700;

    z-index:3;
}

.combo-badge i{
    font-size:13px;
}

/* CONTENT */

.card-content{
    padding:22px;

    display:flex;
    flex-direction:column;

    flex-grow:1;
}

/* HEADER */

.product-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;

    gap:10px;

    margin-bottom:12px;
}

.product-header h2,
.card h2,
.combo-card h2{
    font-family:'Playfair Display',serif;

    font-size:1.45rem;

    color:var(--primary-dark);

    text-align:left;

    line-height:1.4;
}

/* STOCK STATUS */

.stock-status{
    padding:6px 12px;

    border-radius:50px;

    font-size:11px;
    font-weight:700;

    text-transform:uppercase;
}

.stock-status.in{
    background:#dcfce7;
    color:var(--success);
}

.stock-status.out{
    background:#fee2e2;
    color:var(--danger);
}

/* META */

.product-meta{
    display:flex;
    flex-wrap:wrap;

    gap:12px;

    margin-bottom:15px;
}

.product-meta span{
    display:flex;
    align-items:center;
    gap:6px;

    font-size:.85rem;

    color:var(--text-light);
}

.product-meta i{
    color:var(--primary);
}

/* DESCRIPTION */

.product-description,
.card p{
    text-align:left;

    color:#555;

    line-height:1.8;

    font-size:.92rem;

    margin-bottom:18px;
}

/* EXTRA INFO */

.product-extra-info{
    background:#faf7f2;

    border:1px solid var(--border);

    border-radius:14px;

    padding:12px;

    display:grid;
    gap:8px;

    text-align:left;

    margin-bottom:18px;
}

/* PRICE */

.product-price,
.price{
    display:flex;
    align-items:center;

    gap:10px;

    margin-top:auto;
    margin-bottom:20px;

    color:var(--primary);
}

.offer-price{
    font-size:1.75rem;
    font-weight:800;
}

.original-price{
    color:#9ca3af;
    text-decoration:line-through;
    font-size:1rem;
}

.combo-card .price{
    font-size:1.8rem;
    font-weight:800;
}

/* BUTTON */

.order-btn{
    width:100%;

    border:none;

    border-radius:16px;

    padding:14px;

    background:
        linear-gradient(
            135deg,
            var(--primary),
            var(--primary-dark)
        );

    color:#fff;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    transition:.3s ease;
}

.order-btn:hover{
    transform:translateY(-2px);

    box-shadow:
        0 10px 25px rgba(209,122,34,.35);
}

.order-btn:disabled{
    background:#d1d5db;
    color:#6b7280;
    cursor:not-allowed;
}

/* HIDDEN */

.hidden{
    display:none !important;
}

/* TABLET */

@media(max-width:768px){

    .menu-grid,
    .combo-grid{
        grid-template-columns:
            repeat(
                auto-fill,
                minmax(250px,1fr)
            );
    }

    .card img,
    .combo-card img{
        height:220px;
    }

    .product-header h2,
    .card h2,
    .combo-card h2{
        font-size:1.25rem;
    }

    .offer-price,
    .combo-card .price{
        font-size:1.4rem;
    }
}

/* MOBILE */

@media(max-width:480px){

    body{
        padding:15px;
    }

    .menu-grid,
    .combo-grid{
        grid-template-columns:1fr;
        gap:18px;
    }

    .card-content{
        padding:18px;
    }

    .product-header{
        flex-direction:column;
        align-items:flex-start;
    }

    .card img,
    .combo-card img{
        height:220px;
    }

    .offer-price,
    .combo-card .price{
        font-size:1.3rem;
    }

    .order-btn{
        padding:13px;
        font-size:.95rem;
    }
}
</style>
</head>
<body>
  <header>
    <div id="header-container"></div>
  </header>
  <h1>🥘 Special Combos</h1>

  <section class="menu-section">
    <div class="menu-grid" data-category="combos"></div>
  </section>

  <footer>
    <div id="footer-container"></div>
  </footer>
    
  <button id="nextBtn" disabled><i class="fa-solid fa-angle-right"></i>Next</button>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/common.js"></script>
  <script src="js/cart.js" defer></script>
</body>
</html>
