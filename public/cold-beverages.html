<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Cold Beverages Menu</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <style>
    :root{
    --bg:#f4f7fb;
    --surface:#ffffff;
    --primary:#2563eb;
    --primary-dark:#1e40af;
    --success:#16a34a;
    --danger:#dc2626;
    --text:#1f2937;
    --text-light:#6b7280;
    --border:#e5e7eb;
    --shadow:0 10px 30px rgba(0,0,0,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    font-family:'Poppins',sans-serif;
    background:
        radial-gradient(
            circle at top left,
            #eef5ff,
            #f4f7fb 40%
        );
    color:var(--text);
    min-height:100vh;
    padding:25px;
}

/* PAGE TITLE */

h1{
    font-size:clamp(2rem,4vw,3.5rem);
    font-family:'Playfair Display',serif;
    color:var(--primary-dark);
    margin-bottom:35px;
    text-align:center;
}

/* CLOSE BUTTON */

.close-btn{
    position:fixed;
    top:20px;
    right:25px;

    width:48px;
    height:48px;

    border-radius:50%;
    background:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:28px;
    text-decoration:none;

    color:#444;

    box-shadow:var(--shadow);

    transition:.35s;
}

.close-btn:hover{
    transform:rotate(90deg);
    color:#fff;
    background:var(--danger);
}

/* FILTERS */

.filters{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:40px;
}

.filter-btn{
    border:none;

    background:#fff;

    color:var(--primary-dark);

    padding:12px 22px;

    border-radius:50px;

    font-size:.95rem;
    font-weight:600;

    cursor:pointer;

    box-shadow:
        0 4px 15px rgba(0,0,0,.05);

    transition:.3s;
}

.filter-btn:hover,
.filter-btn.active{
    background:
        linear-gradient(
            135deg,
            var(--primary),
            var(--primary-dark)
        );

    color:#fff;

    transform:translateY(-3px);
}

/* PRODUCT GRID */

.menu-grid{
    width:100%;
    max-width:1400px;
    margin:auto;

    display:grid;

    grid-template-columns:
        repeat(
            auto-fill,
            minmax(320px,1fr)
        );

    gap:28px;
}

/* CARD */

.card{
    background:rgba(255,255,255,.85);

    backdrop-filter:blur(14px);

    border-radius:28px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.6);

    box-shadow:var(--shadow);

    display:flex;
    flex-direction:column;

    transition:
        transform .4s ease,
        box-shadow .4s ease;
}

.card:hover{
    transform:translateY(-10px);

    box-shadow:
        0 18px 40px rgba(0,0,0,.12);
}

/* IMAGE */

.card-image-wrapper{
    position:relative;
    overflow:hidden;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;

    transition:transform .6s ease;
}

.card:hover img{
    transform:scale(1.1);
}

/* BADGE */

.product-badge{
    position:absolute;
    top:16px;
    left:16px;

    background:
        linear-gradient(
            135deg,
            #ff7b54,
            #ff4d6d
        );

    color:#fff;

    padding:8px 16px;

    border-radius:50px;

    font-size:12px;
    font-weight:700;

    letter-spacing:.5px;

    z-index:2;
}

/* CONTENT */

.card-content{
    padding:22px;

    display:flex;
    flex-direction:column;
    flex-grow:1;
}

/* HEADER */

.product-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;

    margin-bottom:12px;
}

.product-header h2{
    font-size:1.4rem;
    font-weight:700;
    line-height:1.4;
    text-align:left;
}

/* STOCK */

.stock-status{
    padding:6px 12px;

    border-radius:50px;

    font-size:11px;
    font-weight:700;

    text-transform:uppercase;
}

.stock-status.in{
    background:#dcfce7;
    color:var(--success);
}

.stock-status.out{
    background:#fee2e2;
    color:var(--danger);
}

/* META */

.product-meta{
    display:flex;
    flex-wrap:wrap;
    gap:14px;

    margin-bottom:16px;
}

.product-meta span{
    display:flex;
    align-items:center;
    gap:6px;

    color:var(--text-light);
    font-size:.85rem;
}

.product-meta i{
    color:var(--primary);
}

/* DESCRIPTION */

.product-description{
    text-align:left;

    color:#555;

    line-height:1.8;

    font-size:.92rem;

    margin-bottom:20px;
}

/* EXTRA DETAILS */

.product-extra-info{
    display:grid;
    gap:8px;

    text-align:left;

    margin-bottom:18px;

    padding:12px;

    border-radius:14px;

    background:#f8fafc;
}

.product-extra-info div{
    font-size:.88rem;
    color:#555;
}

.product-extra-info strong{
    color:var(--text);
}

/* PRICE */

.product-price{
    display:flex;
    align-items:center;
    gap:10px;

    margin-top:auto;
    margin-bottom:20px;
}

.offer-price{
    font-size:1.7rem;
    font-weight:800;
    color:var(--primary);
}

.original-price{
    color:#9ca3af;
    text-decoration:line-through;
    font-size:1rem;
}

/* BUTTON */

.order-btn{
    width:100%;

    border:none;

    padding:14px;

    border-radius:16px;

    background:
        linear-gradient(
            135deg,
            var(--primary),
            var(--primary-dark)
        );

    color:#fff;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

.order-btn:hover{
    transform:translateY(-3px);
}

.order-btn:disabled{
    background:#d1d5db;
    color:#6b7280;
    cursor:not-allowed;
    transform:none;
}

/* UTILITIES */

.hidden{
    display:none !important;
}

/* TABLET */

@media(max-width:768px){

    .menu-grid{
        grid-template-columns:
            repeat(
                auto-fill,
                minmax(260px,1fr)
            );
    }

    .card img{
        height:220px;
    }

    .product-header h2{
        font-size:1.2rem;
    }

    .offer-price{
        font-size:1.4rem;
    }
}

/* MOBILE */

@media(max-width:480px){

    body{
        padding:15px;
    }

    .menu-grid{
        grid-template-columns:1fr;
        gap:18px;
    }

    .card img{
        height:220px;
    }

    .card-content{
        padding:18px;
    }

    .product-header{
        flex-direction:column;
        align-items:flex-start;
    }

    .offer-price{
        font-size:1.3rem;
    }

    .order-btn{
        padding:13px;
        font-size:.95rem;
    }
}
  </style>
</head>
<body>
  <a href="Index.html#menu" class="close-btn">&times;</a>
  <h1>❄️ Cold Beverages Menu</h1>

  <section class="menu-section">
    <div class="menu-grid" data-category="cold-beverages"></div>
  </section>

  <button id="nextBtn" disabled><i class="fa-solid fa-angle-right"></i>Next</button>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/cart.js" defer></script>
</body>
</html>
