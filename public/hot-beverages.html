<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Hot Beverages Menu</title>
  <link rel="icon" type="image/png" href="assets/logo-image.png">
  <style>
:root{
    --bg:#f8f4ef;
    --surface:#ffffff;
    --accent:#c97b63;
    --accent-dark:#a65a45;
    --accent-light:#f4d7ce;
    --text:#2b2b2b;
    --text-muted:#6b7280;
    --success:#16a34a;
    --danger:#dc2626;
    --border:#ebe5e0;

    --shadow-sm:0 6px 15px rgba(0,0,0,.06);
    --shadow-md:0 12px 30px rgba(0,0,0,.08);
    --shadow-lg:0 22px 45px rgba(0,0,0,.12);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    font-family:'Poppins',sans-serif;

    background:
        radial-gradient(
            circle at top left,
            #fffdfb,
            #f8f4ef 50%
        );

    color:var(--text);

    min-height:100vh;

    padding:24px;
}

/* HEADER */

h1{
    font-family:'Playfair Display',serif;

    font-size:
        clamp(
            2rem,
            4vw,
            3.8rem
        );

    color:var(--accent-dark);

    text-align:center;

    margin-bottom:35px;

    letter-spacing:.5px;
}

/* CLOSE BUTTON */

.close-btn{
    position:fixed;

    top:20px;
    right:20px;

    width:52px;
    height:52px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:50%;

    background:#fff;

    color:#444;

    text-decoration:none;

    font-size:30px;
    font-weight:700;

    box-shadow:var(--shadow-md);

    transition:.35s ease;

    z-index:999;
}

.close-btn:hover{
    background:var(--accent-dark);

    color:#fff;

    transform:
        rotate(90deg)
        scale(1.05);
}

/* FILTERS */

.filters{
    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:12px;

    margin-bottom:40px;
}

.filter-btn{
    border:none;

    background:#fff;

    color:var(--accent-dark);

    padding:12px 22px;

    border-radius:999px;

    font-size:.95rem;
    font-weight:600;

    cursor:pointer;

    box-shadow:var(--shadow-sm);

    transition:.3s ease;
}

.filter-btn:hover,
.filter-btn.active{
    background:
        linear-gradient(
            135deg,
            var(--accent),
            var(--accent-dark)
        );

    color:#fff;

    transform:
        translateY(-3px);

    box-shadow:
        0 10px 20px rgba(201,123,99,.25);
}

/* GRID */

.menu-grid{
    width:100%;

    max-width:1400px;

    margin:auto;

    display:grid;

    grid-template-columns:
        repeat(
            auto-fill,
            minmax(320px,1fr)
        );

    gap:28px;
}

/* CARD */

.card{
    background:
        rgba(
            255,
            255,
            255,
            .95
        );

    backdrop-filter:
        blur(12px);

    border:
        1px solid
        rgba(
            255,
            255,
            255,
            .7
        );

    border-radius:28px;

    overflow:hidden;

    display:flex;
    flex-direction:column;

    box-shadow:var(--shadow-md);

    transition:
        transform .4s ease,
        box-shadow .4s ease;
}

.card:hover{
    transform:
        translateY(-10px);

    box-shadow:var(--shadow-lg);
}

/* IMAGE */

.card-image-wrapper{
    position:relative;
    overflow:hidden;
}

.card img{
    width:100%;
    height:250px;

    object-fit:cover;

    transition:
        transform .7s ease;
}

.card:hover img{
    transform:scale(1.08);
}

/* BADGE */

.product-badge{
    position:absolute;

    top:15px;
    left:15px;

    background:
        linear-gradient(
            135deg,
            #ff7b54,
            #ff4d6d
        );

    color:#fff;

    padding:8px 14px;

    border-radius:30px;

    font-size:12px;
    font-weight:700;

    letter-spacing:.4px;

    box-shadow:
        0 8px 18px rgba(0,0,0,.15);

    z-index:5;
}

/* CONTENT */

.card-content{
    padding:22px;

    display:flex;
    flex-direction:column;

    flex-grow:1;
}

/* PRODUCT HEADER */

.product-header{
    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:12px;

    margin-bottom:14px;
}

.product-header h2{
    font-family:'Playfair Display',serif;

    font-size:1.45rem;

    color:var(--accent-dark);

    text-align:left;

    line-height:1.4;
}

/* STOCK STATUS */

.stock-status{
    padding:6px 12px;

    border-radius:999px;

    font-size:11px;
    font-weight:700;

    text-transform:uppercase;

    white-space:nowrap;
}

.stock-status.in{
    background:
        rgba(
            22,
            163,
            74,
            .12
        );

    color:var(--success);
}

.stock-status.out{
    background:
        rgba(
            220,
            38,
            38,
            .12
        );

    color:var(--danger);
}

/* PRODUCT META */

.product-meta{
    display:flex;

    flex-wrap:wrap;

    gap:12px;

    margin-bottom:15px;
}

.product-meta span{
    display:flex;

    align-items:center;

    gap:6px;

    font-size:.85rem;

    color:var(--text-muted);
}

.product-meta i{
    color:var(--accent);
}

/* DESCRIPTION */

.product-description{
    text-align:left;

    color:#555;

    font-size:.92rem;

    line-height:1.8;

    margin-bottom:18px;

    display:-webkit-box;

    line-clamp:4;

    -webkit-line-clamp:4;

    -webkit-box-orient:vertical;

    overflow:hidden;
}

/* EXTRA INFO */

.product-extra-info{
    background:#faf8f6;

    border:1px solid var(--border);

    border-radius:14px;

    padding:12px;

    display:grid;

    gap:8px;

    margin-bottom:18px;

    text-align:left;
}

.product-extra-info div{
    font-size:.88rem;
    color:#555;
}

.product-extra-info strong{
    color:var(--text);
}

/* PRICE */

.product-price{
    display:flex;

    align-items:center;

    gap:10px;

    margin-top:auto;

    margin-bottom:20px;
}

.offer-price{
    font-size:1.8rem;

    font-weight:800;

    color:var(--accent);
}

.original-price{
    color:#9ca3af;

    font-size:1rem;

    text-decoration:line-through;
}

/* BUTTON */

.order-btn{
    width:100%;

    border:none;

    border-radius:16px;

    padding:14px;

    background:
        linear-gradient(
            135deg,
            var(--accent),
            var(--accent-dark)
        );

    color:#fff;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    transition:.3s ease;
}

.order-btn:hover{
    transform:
        translateY(-2px);

    box-shadow:
        0 12px 24px rgba(201,123,99,.35);
}

.order-btn:disabled{
    background:#d1d5db;

    color:#6b7280;

    cursor:not-allowed;

    box-shadow:none;
}

/* HIDDEN */

.hidden{
    display:none !important;
}

/* TABLET */

@media(max-width:768px){

    .menu-grid{
        grid-template-columns:
            repeat(
                auto-fill,
                minmax(250px,1fr)
            );
    }

    .card img{
        height:220px;
    }

    .product-header h2{
        font-size:1.25rem;
    }

    .offer-price{
        font-size:1.45rem;
    }
}

/* MOBILE */

@media(max-width:480px){

    body{
        padding:14px;
    }

    h1{
        margin-bottom:25px;
    }

    .menu-grid{
        grid-template-columns:1fr;
        gap:18px;
    }

    .card-content{
        padding:18px;
    }

    .card img{
        height:220px;
    }

    .product-header{
        flex-direction:column;
        align-items:flex-start;
    }

    .offer-price{
        font-size:1.3rem;
    }

    .order-btn{
        padding:13px;
        font-size:.95rem;
    }
}
</style>
</head>
<body>
  <a href="Index.html#menu" class="close-btn">&times;</a>
  <h1>☕ Hot Beverages Menu</h1>

  <!-- Filters  -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="coffee">Coffee</button>
    <button class="filter-btn" data-filter="tea">Tea</button>
    <button class="filter-btn" data-filter="special">Specials</button>
  </div>

  <section class="menu-section">
    <div class="menu-grid" data-category="hot-beverages"></div>
  </section>

  <button id="nextBtn" disabled><i class="fa-solid fa-angle-right"></i>Next</button>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/cart.js" defer></script>
</body>
</html>
